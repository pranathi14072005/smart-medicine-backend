# ===============================
# APPLICATION
# ===============================
spring.application.name=CareMeds

# Render dynamic port (IMPORTANT)
server.port=${PORT:8080}

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PW}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT CONFIG (FIXED ✅)
# ===============================
app.jwt.secret=${JWT_SECRET:defaultSecretKey12345678901234567890}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REF_EXPIRATION:604800000}

# ===============================
# MAIL CONFIG (SECURE ✅)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:pranathipaidi143@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# LOGGING
# ===============================
logging.level.com.smartmedicine=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:3001

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===============================
# SCHEDULER
# ===============================
spring.task.scheduling.pool.size=5